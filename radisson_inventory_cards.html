<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radisson Blu Inventory Counter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .header h1 {
            font-size: 28px;
            color: #2c2c2a;
            margin-bottom: 0.5rem;
        }
        
        .header p {
            font-size: 14px;
            color: #888780;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom: 1rem;
        }
        
        .item-number {
            font-size: 12px;
            color: #b4b2a9;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .item-group {
            font-size: 12px;
            color: #888780;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .item-name {
            font-size: 32px;
            font-weight: 500;
            color: #2c2c2a;
            margin-bottom: 1rem;
            line-height: 1.2;
        }
        
        .item-uom {
            font-size: 16px;
            color: #378ADD;
            font-weight: 500;
            padding: 0.75rem 1rem;
            background: #e6f1fb;
            border-radius: 6px;
            display: inline-block;
            margin-bottom: 2rem;
        }
        
        .input-group {
            margin-bottom: 1.5rem;
        }
        
        .input-group label {
            display: block;
            font-size: 13px;
            color: #888780;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input[type="number"] {
            width: 100%;
            padding: 1rem;
            font-size: 20px;
            border: 2px solid #d3d1c7;
            border-radius: 8px;
            text-align: center;
            font-weight: 500;
            color: #2c2c2a;
            font-family: inherit;
        }
        
        input[type="number"]:focus {
            outline: none;
            border-color: #378ADD;
            box-shadow: 0 0 0 3px rgba(55, 138, 221, 0.1);
        }
        
        .button-group {
            display: flex;
            gap: 12px;
        }
        
        button {
            flex: 1;
            padding: 1rem;
            font-size: 16px;
            font-weight: 500;
            border-radius: 8px;
            border: 2px solid #d3d1c7;
            background: white;
            color: #2c2c2a;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }
        
        button:hover {
            background: #f5f5f5;
            border-color: #b4b2a9;
        }
        
        .submit-btn {
            background: #378ADD;
            color: white;
            border-color: #378ADD;
        }
        
        .submit-btn:hover {
            background: #2c6ab5;
            border-color: #2c6ab5;
        }
        
        .submit-btn:disabled {
            background: #d3d1c7;
            border-color: #d3d1c7;
            cursor: not-allowed;
            opacity: 0.5;
        }
        
        .progress {
            margin-bottom: 2rem;
            text-align: center;
        }
        
        .progress-bar {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 0.75rem;
        }
        
        .progress-fill {
            height: 100%;
            background: #378ADD;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            font-size: 13px;
            color: #888780;
        }
        
        .summary {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
        }
        
        .summary h2 {
            font-size: 24px;
            color: #2c2c2a;
            margin-bottom: 1rem;
        }
        
        .summary p {
            font-size: 14px;
            color: #888780;
            margin-bottom: 2rem;
        }
        
        .summary-items {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 2rem;
            text-align: left;
        }
        
        .summary-item {
            padding: 0.75rem;
            border-bottom: 1px solid #e0e0e0;
            font-size: 14px;
        }
        
        .summary-item:last-child {
            border-bottom: none;
        }
        
        .summary-item-name {
            font-weight: 500;
            color: #2c2c2a;
        }
        
        .summary-item-qty {
            color: #888780;
            font-size: 13px;
        }
        
        .button-group-summary {
            display: flex;
            gap: 12px;
        }
        
        .button-group-summary button {
            flex: 1;
        }
        
        .reset-btn {
            background: white;
            border: 2px solid #d3d1c7;
            color: #2c2c2a;
        }
        
        .download-btn {
            background: #378ADD;
            color: white;
            border-color: #378ADD;
        }
        
        .download-btn:hover {
            background: #2c6ab5;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Radisson Blu</h1>
            <p>Kitchen Inventory Count</p>
        </div>
        
        <div id="counter-view">
            <div class="progress">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">Item 1 of 406</div>
            </div>
            
            <div class="card">
                <div class="item-number" id="itemNumber">Item 1</div>
                <div class="item-group" id="itemGroup"></div>
                <div class="item-name" id="itemName">Apples</div>
                <div class="item-uom" id="itemUOM">lb</div>
                
                <div class="input-group">
                    <label for="quantity">Quantity counted</label>
                    <input type="number" id="quantity" placeholder="0" step="0.1" autofocus />
                </div>
                
                <div class="button-group">
                    <button class="submit-btn" id="submitBtn">Log & next</button>
                </div>
            </div>
        </div>
        
        <div id="summary-view" style="display: none;">
            <div class="summary">
                <h2>Count complete</h2>
                <p>You counted <strong id="totalItems">0</strong> items</p>
                
                <div class="summary-items" id="summaryList"></div>
                
                <div class="button-group-summary">
                    <button class="reset-btn" onclick="resetCount()">Start over</button>
                    <button class="download-btn" onclick="downloadCSV()">Download CSV</button>
                </div>
            </div>
        </div>
    </div>

        let inventory = JSON.parse(localStorage.getItem('radisson_inventory') || '[]');
        let currentIndex = 0;

        function displayItem() {
            const item = ITEMS[currentIndex];
            document.getElementById('itemNumber').textContent = `Item ${currentIndex + 1}`;
            document.getElementById('itemGroup').textContent = item.group;
            document.getElementById('itemName').textContent = item.name;
            document.getElementById('itemUOM').textContent = item.unit;
            
            const percent = ((currentIndex + 1) / ITEMS.length) * 100;
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('progressText').textContent = `Item ${currentIndex + 1} of ${ITEMS.length}`;
            
            document.getElementById('quantity').value = '';
            document.getElementById('quantity').focus();
        }

        function submitQuantity() {
            const quantity = parseFloat(document.getElementById('quantity').value);
            if (!quantity || quantity < 0) return;
            
            const item = ITEMS[currentIndex];
            inventory.push({
                name: item.name,
                group: item.group,
                quantity: quantity,
                unit: item.unit
            });
            
            currentIndex++;
            if (currentIndex >= ITEMS.length) {
                showSummary();
            } else {
                displayItem();
            }
        }

        function showSummary() {
            document.getElementById('counter-view').style.display = 'none';
            document.getElementById('summary-view').style.display = 'block';
            document.getElementById('totalItems').textContent = inventory.length;
            
            const list = document.getElementById('summaryList');
            list.innerHTML = inventory.map(item => `
                <div class="summary-item">
                    <div class="summary-item-name">${item.name}</div>
                    <div class="summary-item-qty">${item.quantity} ${item.unit}</div>
                </div>
            `).join('');
            
            localStorage.setItem('radisson_inventory', JSON.stringify(inventory));
        }

        function resetCount() {
            inventory = [];
            currentIndex = 0;
            localStorage.removeItem('radisson_inventory');
            document.getElementById('counter-view').style.display = 'block';
            document.getElementById('summary-view').style.display = 'none';
            displayItem();
        }

        function downloadCSV() {
            let csv = 'Item Name,Group,Quantity,Unit\n';
            inventory.forEach(item => {
                csv += `"${item.name}","${item.group}",${item.quantity},"${item.unit}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'radisson_inventory_' + new Date().toISOString().split('T')[0] + '.csv';
            a.click();
        }

        // Enter key to submit
        document.getElementById('quantity').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') submitQuantity();
        });

        document.getElementById('submitBtn').addEventListener('click', submitQuantity);

        displayItem();
    </script>
